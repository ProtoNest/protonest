<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Projetos</title>

<style>
body { background:#0d1117; color:#c9d1d9; font-family:Arial; margin:0; }

.container { max-width:1000px; margin:auto; padding:40px 20px; }

h1 { text-align:center; font-size:42px; }
.sub { text-align:center; color:#8b949e; margin-bottom:30px; font-size:18px; }

.bloco {
  display:flex;
  flex-wrap:wrap;
  gap:30px;
  align-items:center;
}

.bloco img {
  width:350px;
  max-width:100%;
  border-radius:10px;
}

.lista { max-width:500px; font-size:18px; }

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  margin-top: 30px;
}

.galeria img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

/* WHATS FIXO */
.whats-fixo {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:18px;
  border-radius:50px;
  text-decoration:none;
  font-size:16px;
}

/* LIGHTBOX */
.lightbox {
  display:none;
  position:fixed;
  z-index:999;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.lightbox img {
  max-width:90%;
  max-height:65%;
  border-radius:10px;
}

#legenda {
  margin-top:15px;
  font-size:20px;
  text-align:center;
  padding:10px;
}

/* BOTÃO */
.whats-lightbox {
  margin-top:20px;
  background:#25D366;
  color:white;
  padding:16px 26px;
  border-radius:30px;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}

/* SETAS */
.seta {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:45px;
  color:white;
  cursor:pointer;
}

.esquerda { left:20px; }
.direita { right:20px; }

/* FECHAR */
.fechar {
  position:absolute;
  top:20px;
  right:30px;
  font-size:35px;
  cursor:pointer;
}

/* MOBILE */
@media (max-width:600px){
  h1 { font-size:32px; }
  .sub { font-size:16px; }
  #legenda { font-size:18px; }
  .whats-lightbox { width:80%; font-size:16px; }
}
</style>
</head>

<body>

<div class="container">

<a href="index.html">← Voltar</a>

<h1>Projetos</h1>
<p class="sub">Desenvolvimento de soluções personalizadas em automação e tecnologia.</p>

<div class="bloco">
  <img src="projetos.jpg">
  <div class="lista">
    <ul>
      <li>Programação de CLP e IHM</li>
      <li>Eletrônica Embarcada</li>
      <li>Design de PCB</li>
      <li>IoT (Internet das Coisas)</li>
    </ul>
  </div>
</div>

<div class="galeria">
  <img src="img_proj1.jpg" onclick="abrirLightbox(0)">
  <img src="img_proj2.jpg" onclick="abrirLightbox(1)">
  <img src="img_proj3.jpg" onclick="abrirLightbox(2)">
</div>

</div>

<a class="whats-fixo" href="https://wa.me/5555996294266">WhatsApp</a>

<div id="lightbox" class="lightbox">
  <span class="fechar" onclick="fecharLightbox()">&times;</span>
  <span class="seta esquerda" onclick="anterior()">❮</span>
  <span class="seta direita" onclick="proxima()">❯</span>

  <img id="imgLightbox">
  <p id="legenda"></p>

  <a class="whats-lightbox" href="https://wa.me/5555996294266">
    Falar no WhatsApp
  </a>
</div>

<script>
let imagens = [
  {src:"img_proj1.jpg", legenda:"Projeto PCB"},
  {src:"img_proj2.jpg", legenda:"Projeto IoT"},
  {src:"img_proj3.jpg", legenda:"Automação Industrial"}
];

let indexAtual = 0;

function abrirLightbox(i){
  indexAtual=i;
  atualizar();
  document.getElementById("lightbox").style.display="flex";
}

function atualizar(){
  imgLightbox.src=imagens[indexAtual].src;
  legenda.innerText=imagens[indexAtual].legenda;
}

function fecharLightbox(){
  lightbox.style.display="none";
}

function proxima(){
  indexAtual=(indexAtual+1)%imagens.length;
  atualizar();
}

function anterior(){
  indexAtual=(indexAtual-1+imagens.length)%imagens.length;
  atualizar();
}
</script>

</body>
</html>
