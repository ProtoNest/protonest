<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Produtos</title>

<style>
body { background:#0d1117; color:#c9d1d9; font-family:Arial; margin:0; }

.container { max-width:1000px; margin:auto; padding:40px 20px; }

h1 { text-align:center; }
.sub { text-align:center; color:#8b949e; margin-bottom:30px; }

.bloco {
  display:flex;
  flex-wrap:wrap;
  gap:30px;
  align-items:center;
}

.bloco img {
  width:350px;
  border-radius:10px;
}

.lista { max-width:500px; }

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  margin-top: 30px;
}

.galeria img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

/* WHATS FIXO */
.whats-fixo {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
}

/* LIGHTBOX */
.lightbox {
  display:none;
  position:fixed;
  z-index:999;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.lightbox img {
  max-width:90%;
  max-height:70%;
  border-radius:10px;
}

.lightbox p {
  margin-top:15px;
  color:#ccc;
}

/* FECHAR */
.fechar {
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

/* SETAS */
.seta {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  padding:10px;
}

.esquerda { left:20px; }
.direita { right:20px; }

/* BOTÃO WHATS DENTRO */
.whats-lightbox {
  margin-top:15px;
  background:#25D366;
  color:white;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

@media (max-width: 600px) {

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .sub {
    font-size: 16px;
  }

  .lista li {
    font-size: 16px;
    margin-bottom: 8px;
  }

  .galeria img {
    height: 220px; /* pode ajustar */
  }

  /*>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>LEGENDA DO LIGHTBOX */
  #legenda {
    color: #e6edf3;
    font-size: 18px;
    text-align: center;
    padding: 10px;
  }

  /* BOTÃO WHATS DENTRO DA IMAGEM */
  .whats-lightbox {
    box-shadow: 0 0 10px rgba(37,211,102,0.5);
    width: 80%;
    text-align: center;
    font-size: 16px;
    padding: 14px 22px;
  }

  /* BOTÃO WHATS FIXO */
  .whats-fixo {
    font-size: 14px;
    padding: 14px;
  }

}

  
</style>
</head>

<body>

<div class="container">

<a href="index.html">← Voltar</a>

<h1>Produtos</h1>
<p class="sub">Soluções sob medida para indústria e agro.</p>

<div class="bloco">
  <img src="produtos1.png">

  <div class="lista">
    <ul>
      <li>Quadro de comando para poço artesiano</li>
      <li>Quadro de proteção com DPS</li>
      <li>Sistema de pulverização automático</li>
      <li>Pulverização por seção</li>
    </ul>
  </div>
</div>

<!-- GALERIA -->
<div class="galeria">
  <img src="img_prod1.jpg" onclick="abrirLightbox(0)">
  <img src="img_prod2.jpg" onclick="abrirLightbox(1)">
  <img src="img_prod3.jpg" onclick="abrirLightbox(2)">
  <img src="img_prod4.jpg" onclick="abrirLightbox(3)">
  <img src="img_prod5.jpg" onclick="abrirLightbox(4)">
  <img src="img_prod6.jpg" onclick="abrirLightbox(5)">
  <img src="img_serv1.png" onclick="abrirLightbox(6)">
  <img src="img_serv2.png" onclick="abrirLightbox(7)">
  <img src="img_serv3.jpg" onclick="abrirLightbox(8)">
  <img src="img_serv4.jpg" onclick="abrirLightbox(9)">
</div>

</div>

<a class="whats-fixo" href="https://wa.me/5555996294266">WhatsApp</a>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <span class="fechar" onclick="fecharLightbox()">&times;</span>

  <span class="seta esquerda" onclick="anterior()">❮</span>
  <span class="seta direita" onclick="proxima()">❯</span>

  <img id="imgLightbox">
  <p id="legenda"></p>

  <a class="whats-lightbox" href="https://wa.me/5555996294266" target="_blank">
    Falar no WhatsApp
  </a>
</div>

<script>
let imagens = [
  {src:"img_prod1.jpg", legenda:"Sistema de pulverização inteligente Planta a Planta"},
  {src:"img_prod2.jpg", legenda:"Comandos elétricos pulverização por seção"},
  {src:"img_prod3.jpg", legenda:"Controles elétricos para barra por seção"},
  {src:"img_prod4.jpg", legenda:"Sistema de pulverização inteligente Planta a Planta"},
  {src:"img_prod5.jpg", legenda:"Sistema de pulverização inteligente Planta a Planta"},
  {src:"img_prod6.jpg", legenda:"Sistema de pulverização inteligente Planta a Planta"},
  {src:"img_serv1.png", legenda:"Quadros de comando para Irrigação"},
  {src:"img_serv2.png", legenda:"Quadros de Proteção para instalações elétricas"},
  {src:"img_serv3.jpg", legenda:"Quadros elétricos de comando Automatizados"},
  {src:"img_serv4.jpg", legenda:"Quadros de comando dimensionados para poço Artesiano"}
];

let indexAtual = 0;

function abrirLightbox(index) {
  indexAtual = index;
  atualizarLightbox();
  document.getElementById("lightbox").style.display = "flex";
}

function atualizarLightbox() {
  document.getElementById("imgLightbox").src = imagens[indexAtual].src;
  document.getElementById("legenda").innerText = imagens[indexAtual].legenda;
}

function fecharLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

// clicar fora fecha
document.getElementById("lightbox").addEventListener("click", function(e) {
  if (e.target === this) fecharLightbox();
});

// navegação
function proxima() {
  indexAtual = (indexAtual + 1) % imagens.length;
  atualizarLightbox();
}

function anterior() {
  indexAtual = (indexAtual - 1 + imagens.length) % imagens.length;
  atualizarLightbox();
}

// teclado
document.addEventListener("keydown", function(e) {
  if (document.getElementById("lightbox").style.display === "flex") {
    if (e.key === "ArrowRight") proxima();
    if (e.key === "ArrowLeft") anterior();
    if (e.key === "Escape") fecharLightbox();
  }
});

// swipe mobile
let startX = 0;

document.getElementById("lightbox").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.getElementById("lightbox").addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX < startX - 50) proxima();
  if (endX > startX + 50) anterior();
});
</script>

</body>
</html>
