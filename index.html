<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProtoNest Automação</title>

<style>

/* SCROLL SUAVE */
html{
  scroll-behavior:smooth;
}

/* BODY */
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0d1117;
  color:#c9d1d9;
  overflow-x:hidden;
  box-sizing:border-box;
}

*{
  box-sizing:border-box;
}

/* MENU */
.menu{
  position:sticky;
  top:0;
  z-index:999;
  background:#161b22;
  border-bottom:1px solid #30363d;
}

.menu-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo-menu{
  font-size:22px;
  font-weight:bold;
}

.azul{ color:#4ea8de; }
.verde{ color:#2ea043; }

.menu-links{
  display:flex;
  gap:25px;
}

.menu-links a{
  color:#c9d1d9;
  text-decoration:none;
  font-size:15px;
  transition:0.3s;
}

.menu-links a:hover{
  color:#58a6ff;
}

/* HERO */
.hero{
  padding:90px 20px 70px;
  text-align:center;
  background:
  linear-gradient(rgba(13,17,23,0.85), rgba(13,17,23,0.95)),
  url("projetos.jpg");
  background-size:cover;
  background-position:center;
}

.titulo{
  font-size:3.2em;
  font-weight:800;
  margin-bottom:10px;
}

.headline{
  max-width:900px;
  margin:auto;
  font-size:1.4em;
  line-height:1.5;
  color:#c9d1d9;
}

.slogan{
  color:#8b949e;
  margin-top:20px;
  font-size:18px;
}

/* BOTÕES */
.hero-botoes{
  margin-top:35px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  display:inline-block;
  padding:14px 28px;
  background:#238636;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  background:#2ea043;
  transform:translateY(-2px);
}

.btn-sec{
  background:#21262d;
}

.btn-sec:hover{
  background:#30363d;
}

/* CONTAINERS */
.container{
  max-width:1200px;
  margin:auto;
  padding:70px 20px;
}

/* TITULOS */
h2{
  text-align:center;
  font-size:34px;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:#8b949e;
  margin-bottom:40px;
  font-size:18px;
}

/* SOBRE */
.sobre{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  align-items:center;
}

.sobre img{
  width:380px;
  max-width:100%;
  border-radius:12px;
}

.sobre-texto{
  max-width:550px;
}

.sobre-texto p{
  font-size:18px;
  line-height:1.7;
  margin-bottom:18px;
}

/* CARDS */
.card-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  background:#161b22;
  padding:20px;
  border-radius:14px;
  width:280px;
  transition:0.3s;
  border:1px solid #21262d;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#30363d;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

.card h3{
  font-size:24px;
  margin-top:18px;
}

.card p{
  color:#8b949e;
  line-height:1.5;
}

/* TECNOLOGIAS */
.techs{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
  margin-top:35px;
}

.tech{
  background:#161b22;
  border:1px solid #30363d;
  padding:12px 20px;
  border-radius:30px;
  font-size:15px;
  transition:0.3s;
}

.tech:hover{
  border-color:#4ea8de;
  transform:translateY(-2px);
}

/* WHATS */
.whats-fixo{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:16px 22px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 20px rgba(37,211,102,0.3);
}

/* FOOTER */
.footer{
  text-align:center;
  padding:40px 20px;
  border-top:1px solid #21262d;
  color:#8b949e;
  font-size:14px;
}

/* MOBILE */
@media (max-width:768px){

  body{
    overflow-x:hidden;
  }

  .container{
    padding:55px 18px;
  }

  /* MENU */
  .menu-container{
    flex-direction:column;
    gap:14px;
    padding:14px 12px;
  }

  .menu-links{
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .menu-links a{
    font-size:14px;
  }

  /* HERO */
  .hero{
    padding:70px 18px 55px;
  }

  .titulo{
    font-size:2.2em;
    line-height:1.1;
  }

  .headline{
    font-size:1.08em;
    line-height:1.6;
    max-width:100%;
  }

  .slogan{
    font-size:16px;
    line-height:1.5;
  }

  .hero-botoes{
    width:100%;
    gap:12px;
  }

  .hero-botoes .btn{
    width:100%;
    max-width:320px;
  }

  /* TITULOS */
  h2{
    font-size:28px;
    line-height:1.2;
  }

  .sub{
    font-size:16px;
    line-height:1.6;
    margin-bottom:30px;
  }

  /* SOBRE */
  .sobre{
    gap:30px;
  }

  .sobre img{
    width:100%;
    max-width:340px;
  }

  .sobre-texto{
    width:100%;
  }

  .sobre-texto p{
    font-size:16px;
    line-height:1.7;
    text-align:left;
  }

  /* CARDS */
  .card-container{
    gap:22px;
  }

  .card{
    width:100%;
    max-width:340px;
    padding:18px;
  }

  .card img{
    height:210px;
  }

  .card h3{
    font-size:24px;
  }

  .card p{
    font-size:16px;
    line-height:1.5;
  }

  .btn{
    width:100%;
    text-align:center;
    font-size:16px;
  }

  /* TECNOLOGIAS */
  .techs{
    gap:10px;
  }

  .tech{
    font-size:14px;
    padding:10px 16px;
  }

  /* WHATS */
  .whats-fixo{
    right:15px;
    bottom:15px;
    padding:15px 18px;
    font-size:15px;
  }

  /* FOOTER */
  .footer{
    font-size:13px;
    line-height:1.5;
    padding:30px 20px;
  }

}

</style>
</head>
